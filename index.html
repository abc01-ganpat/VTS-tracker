<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VTS Dashboard</title>
  <style>
    :root {
      --bg-color: #0f0f0f; --card-bg: #1a1a1a; --accent-green: #2ecc71; --accent-red: #e74c3c;
      --text-main: #ffffff; --text-dim: #999999;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 0; background: var(--bg-color); color: var(--text-main); 
      height: 100dvh; overflow: hidden; 
    }

    /* Layout */
    .app-container { display: grid; height: 100%; grid-template-rows: auto 1fr; }
    .header { padding: 4px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; z-index: 10; }
    .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; background: #333; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
    .status-badge.active { color: var(--accent-red); background: rgba(231, 76, 60, 0.1); }
    .recording-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; display: none; }
    .status-badge.active .recording-dot { display: block; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .content-layout { display: grid; grid-template-columns: 1fr; overflow: hidden; height: 100%; }
    .video-section { display: flex; align-items: center; justify-content: center; padding: 5px; background: #000; }
    .video-wrapper { width: min(90vw, 75vh); height: min(90vw, 75vh); position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    #video { width: 100%; height: 100%; object-fit: cover; }
    .data-section { display: flex; flex-direction: column; padding: 10px 15px; overflow-y: auto; gap: 10px; background: var(--bg-color); }

    /* Controls & Sensors */
    .btn-container { width: 100%; }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    #startBtn { background: var(--accent-green); color: #000; }
    #endBtn { background: var(--accent-red); color: #fff; display: none; }
    button:active { transform: scale(0.97); opacity: 0.9; }
    .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .sensor-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 1px solid #222; }
    .sensor-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; display: block; }
    .sensor-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
    #log-status { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* Modals & Overlays */
    .overlay-base {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
    }
    .modal-box {
      background: #1e1e1e; width: 100%; max-width: 320px; border-radius: 20px;
      padding: 25px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
    }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
    .modal-msg { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.4; }
    .modal-input {
      width: 100%; padding: 12px; background: #111; border: 1px solid #444;
      border-radius: 10px; color: white; margin-bottom: 20px; text-align: center; font-size: 16px;
    }
    .modal-btn { background: var(--accent-green); color: #000; margin-top: 5px; }
    .modal-btn.secondary { background: transparent; border: 1px solid #444; color: #999; margin-top: 10px; }

    .loader {
      border: 4px solid #333; border-top: 4px solid var(--accent-green);
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (orientation: landscape) {
      .content-layout { grid-template-columns: 1fr 1fr; }
      .video-wrapper { width: min(45vw, 85vh); height: min(45vw, 85vh); } 
      .data-section { border-left: 1px solid #222; }
    }
    canvas { display: none; }
  </style>
</head>
<body>

<!-- Global Modal -->
<div id="modalOverlay" class="overlay-base">
  <div class="modal-box">
    <div id="modalTitle" class="modal-title">Title</div>
    <div id="modalMsg" class="modal-msg">Message goes here...</div>
    <input id="modalInput" class="modal-input" type="text" spellcheck="false" autocomplete="off">
    <button id="modalConfirm" class="modal-btn">CONTINUE</button>
    <button id="modalCancel" class="modal-btn secondary">CANCEL</button>
  </div>
</div>

<!-- Sync/Auth Overlay -->
<div id="syncOverlay" class="overlay-base">
  <div class="loader"></div>
  <div id="syncMsg" style="font-weight: bold; text-align: center;">Authenticating...</div>
</div>

<div class="app-container">
  <div class="header">
    <div style="font-weight: 800; font-size: 14px;">VTS<span style="color: var(--accent-green);">2</span></div>
    <div id="statusBadge" class="status-badge"><div class="recording-dot"></div><span id="statusText">Ready</span></div>
  </div>

  <div class="content-layout">
    <div class="video-section">
      <div class="video-wrapper"><video id="video" autoplay playsinline muted></video></div>
    </div>

    <div class="data-section">
      <div class="btn-container">
        <button id="startBtn">START TRACKING</button>
        <button id="endBtn">END SESSION</button>
        <div id="log-status">Ready.</div>
      </div>

      <div class="sensor-grid">
        <div class="sensor-card"><span class="sensor-label">Speed</span><span class="sensor-value"><span id="val_speed">0.000</span> <small>km/h</small></span></div>
        <div class="sensor-card"><span class="sensor-label">Queue</span><span class="sensor-value" id="val_buffer">0 files pending</span></div>
        <div class="sensor-card" style="grid-column: span 2;"><span class="sensor-label">Location</span><span class="sensor-value" id="val_gps">Searching...</span></div>
        <div class="sensor-card" style="grid-column: span 2;"><span class="sensor-label">Orientation</span><span class="sensor-value" id="val_orient">0.000° / 0.000° / 0.000°</span></div>
      </div>

      <button id="resetBtn" style="background: transparent; border: 1px solid #444; color: #666; margin-top: auto; padding: 10px; font-size: 12px; border-radius: 8px;">Reset Password</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby9L5h85DF5AzWZ7uV-l0h910rnFMbPlZ3VWU95uSG38sjf6h-qHnZVlh75JqbWbPwwMQ/exec"; 
    const CAPTURE_FPS = 5, CHUNK_DURATION_SEC = 5, CHUNK_SIZE = CAPTURE_FPS * CHUNK_DURATION_SEC, RESOLUTION = 720;

    let db, stream, video, canvas, ctx, isTracking = false, timer = null, dataBuffer = [], sessionId = "";
    let userAcronym = localStorage.getItem('vts_acronym') || "";
    let userPassword = localStorage.getItem('vts_password') || "";
    let currentSensors = { lat: 0, lng: 0, speed: 0.0, alpha: 0, beta: 0, gamma: 0 };
    let isUploading = false;

    // --- MODAL SYSTEM ---
    const showModal = (config) => {
      return new Promise((resolve) => {
        const ov = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const msg = document.getElementById('modalMsg');
        const input = document.getElementById('modalInput');
        const btnOk = document.getElementById('modalConfirm');
        const btnNo = document.getElementById('modalCancel');

        title.innerText = config.title || "VTS System";
        msg.innerText = config.msg || "";
        input.style.display = config.input ? 'block' : 'none';
        input.value = "";
        input.placeholder = config.placeholder || "";
        btnNo.style.display = config.cancel ? 'block' : 'none';
        ov.style.display = 'flex';

        btnOk.onclick = () => {
          const val = input.value.trim();
          if (config.input && config.minLen && val.length < config.minLen) return;
          ov.style.display = 'none';
          resolve(config.input ? val : true);
        };
        btnNo.onclick = () => { ov.style.display = 'none'; resolve(null); };
      });
    };

    const showSync = (show, msg = "Processing...") => {
      const ov = document.getElementById('syncOverlay');
      document.getElementById('syncMsg').innerText = msg;
      ov.style.display = show ? 'flex' : 'none';
    };

    // --- INITIALIZATION ---
    window.onload = async () => {
      video = document.getElementById('video'); canvas = document.getElementById('canvas');
      canvas.width = RESOLUTION; canvas.height = RESOLUTION; ctx = canvas.getContext('2d');
      await initDB();

      if (!userAcronym) {
        const name = await showModal({ title: "Setup Profile", msg: "Please enter your full name:", input: true, minLen: 2 });
        userAcronym = generateAcronym(name); localStorage.setItem('vts_acronym', userAcronym);
      }

      await runAuthFlow();
      updateStatus(`User: ${userAcronym}`);
      processQueue(); await initCamera(); initSensors();
    };

    document.getElementById('resetBtn').onclick = async () => {
      const ok = await showModal({ title: "Reset Password", msg: "Confirm password reset?", cancel: true });
      if (ok) {
        userPassword = ""; localStorage.removeItem('vts_password');
        await runAuthFlow();
      }
    };

    async function runAuthFlow() {
      let isAuthenticated = false;
      while (!isAuthenticated) {
        if (!userPassword) {
          userPassword = await showModal({ title: "Secure Access", msg: "Enter Security Key (min 6 chars):", input: true, minLen: 6 });
        }
        showSync(true, "Authenticating Please wait!...");
        const result = await verifyPasswordServer(userPassword);
        showSync(false);
        if (result.success) {
          localStorage.setItem('vts_password', userPassword);
          isAuthenticated = true;
        } else {
          await showModal({ title: "Auth Failed", msg: "Invalid security key. Please try again." });
          userPassword = "";
        }
      }
    }

    // --- LOGIC & HELPERS ---
    function verifyPasswordServer(pass) {
      return new Promise((resolve) => {
        const callbackName = 'auth_cb_' + Math.floor(Math.random() * 1000000);
        const script = document.createElement('script');
        window[callbackName] = (res) => { document.body.removeChild(script); delete window[callbackName]; resolve(res); };
        script.src = `${API_URL}?action=validate&password=${pass}&callback=${callbackName}`;
        script.onerror = () => resolve({ success: false });
        document.body.appendChild(script);
      });
    }

    const initDB = () => new Promise((resolve) => {
      const request = indexedDB.open("VTS_Queue", 1);
      request.onupgradeneeded = (e) => e.target.result.createObjectStore("uploads", { keyPath: "id", autoIncrement: true });
      request.onsuccess = (e) => { db = e.target.result; resolve(); };
    });

    const saveToQueue = (filename, data) => {
      const tx = db.transaction("uploads", "readwrite");
      tx.objectStore("uploads").add({ filename, data, ts: Date.now() });
      tx.oncomplete = () => processQueue();
    };

    const getQueueCount = () => new Promise((resolve) => {
      const tx = db.transaction("uploads", "readonly");
      const countReq = tx.objectStore("uploads").count();
      countReq.onsuccess = () => resolve(countReq.result);
    });

    const processQueue = async () => {
      if (isUploading) return; isUploading = true;
      const count = await getQueueCount();
      document.getElementById('val_buffer').innerText = `${count} files pending`;
      const tx = db.transaction("uploads", "readonly");
      const cursorReq = tx.objectStore("uploads").openCursor();
      cursorReq.onsuccess = async (e) => {
        const cursor = e.target.result;
        if (cursor) {
          const item = cursor.value;
          updateStatus(`Syncing...`);
          try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ password: userPassword, data: item.data, filename: item.filename }) });
            const delTx = db.transaction("uploads", "readwrite");
            delTx.objectStore("uploads").delete(item.id);
            delTx.oncomplete = () => { isUploading = false; processQueue(); };
          } catch (err) { isUploading = false; }
        } else { isUploading = false; if(!isTracking) updateStatus("Sync Complete"); }
      };
    };

    function generateAcronym(name) {
      const words = name.trim().split(/\s+/);
      let acro = words.length >= 3 ? words.slice(0,3).map(w => w[0]).join('') : 
                 words.length === 2 ? words[0][0] + words[1].substring(0,2) : words[0].substring(0,3);
      return acro.toUpperCase().padEnd(3, 'X').substring(0,3);
    }

    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: RESOLUTION, height: RESOLUTION } });
        video.srcObject = stream; await video.play(); return true;
      } catch (err) { return false; }
    }

    function initSensors() {
      if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition((pos) => {
          currentSensors.lat = Number(pos.coords.latitude.toFixed(3));
          currentSensors.lng = Number(pos.coords.longitude.toFixed(3));
          currentSensors.speed = Number(((pos.coords.speed || 0) * 3.6).toFixed(3));
          updateUI();
        }, null, { enableHighAccuracy: true });
      }
      window.addEventListener('deviceorientation', (e) => {
        currentSensors.alpha = e.alpha ? Number(e.alpha.toFixed(3)) : 0;
        currentSensors.beta = e.beta ? Number(e.beta.toFixed(3)) : 0;
        currentSensors.gamma = e.gamma ? Number(e.gamma.toFixed(3)) : 0;
        updateUI();
      });
    }

    document.getElementById('startBtn').onclick = async () => {
      sessionId = Math.floor(Math.random() * 0xFFFFFF).toString(16).toUpperCase().padStart(6, '0');
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch (e) {}
      }
      if (!stream || !stream.active) await initCamera();
      initSensors();
      isTracking = true; dataBuffer = [];
      document.getElementById('startBtn').style.display = 'none'; document.getElementById('endBtn').style.display = 'block';
      document.getElementById('statusBadge').classList.add('active'); document.getElementById('statusText').innerText = "Recording";
      updateStatus(`Session: ${sessionId}`);
      timer = setInterval(captureFrame, 1000 / CAPTURE_FPS);
    };

    document.getElementById('endBtn').onclick = () => {
      isTracking = false; clearInterval(timer);
      document.getElementById('startBtn').style.display = 'block'; document.getElementById('endBtn').style.display = 'none';
      document.getElementById('statusBadge').classList.remove('active'); document.getElementById('statusText').innerText = "Ready";
      if (dataBuffer.length > 0) queueChunk([...dataBuffer]);
      dataBuffer = [];
      updateStatus("Session Finished.");
    };

    function captureFrame() {
      const size = Math.min(video.videoWidth, video.videoHeight);
      ctx.drawImage(video, (video.videoWidth-size)/2, (video.videoHeight-size)/2, size, size, 0, 0, RESOLUTION, RESOLUTION);
      dataBuffer.push({ ts: new Date().toISOString(), sensors: { ...currentSensors }, img: canvas.toDataURL('image/jpeg', 0.6) });
      updateUI();
      if (dataBuffer.length >= CHUNK_SIZE) { queueChunk([...dataBuffer]); dataBuffer = []; }
    }

    function queueChunk(data) {
      const pad = (n) => n.toString().padStart(2, '0');
      const d1 = new Date(data[0].ts), d2 = new Date(data[data.length-1].ts);
      const f1 = `${pad(d1.getDate())}-${pad(d1.getMonth()+1)}-${d1.getFullYear().toString().slice(-2)}_${pad(d1.getHours())}-${pad(d1.getMinutes())}-${pad(d1.getSeconds())}`;
      const f2 = `${pad(d2.getDate())}-${pad(d2.getMonth()+1)}-${d2.getFullYear().toString().slice(-2)}_${pad(d2.getHours())}-${pad(d2.getMinutes())}-${pad(d2.getSeconds())}`;
      const filename = `${userAcronym}_${sessionId}_${f1}_to_${f2}.txt`;
      saveToQueue(filename, data);
    }

    function updateUI() {
      document.getElementById('val_speed').innerText = currentSensors.speed.toFixed(3);
      document.getElementById('val_gps').innerText = `${currentSensors.lat.toFixed(3)}, ${currentSensors.lng.toFixed(3)}`;
      document.getElementById('val_orient').innerText = `${currentSensors.alpha.toFixed(3)}° / ${currentSensors.beta.toFixed(3)}° / ${currentSensors.gamma.toFixed(3)}°`;
      getQueueCount().then(c => document.getElementById('val_buffer').innerText = `${c} files pending`);
    }

    function updateStatus(msg) { document.getElementById('log-status').innerText = msg; }
</script>
</body>
</html>
